name: proxymesh-ss2022-e2e

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: proxymesh
      POSTGRES_USER: proxymesh
      POSTGRES_PASSWORD: e2e-password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U proxymesh -d proxymesh"]
      interval: 1s
      timeout: 2s
      retries: 30

  control-plane:
    build:
      context: ../../..
      dockerfile: Dockerfile.control-plane
    environment:
      DATABASE_URL: postgres://proxymesh:e2e-password@postgres:5432/proxymesh?sslmode=disable
      ENCRYPTION_KEY: e2e-encryption-key
      ADMIN_TOKEN: e2e-admin-token
      PUBLIC_PROXY_HOST: gateway
      INGRESS_PORT_START: 51000
      INGRESS_PORT_END: 51001
      AUTO_MIGRATE: "true"
      HTTP_ADDR: :8080
      GRPC_ADDR: :9090
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:18081:8080"

  upstream:
    image: gogost/gost:3.2.6
    command: ["-L", "socks5://up-user:up-pass@:1080"]

  gateway:
    build:
      context: ../../..
      dockerfile: Dockerfile.gateway
    environment:
      CONTROL_GRPC_ADDR: control-plane:9090
      ENCRYPTION_KEY: e2e-encryption-key
      SNAPSHOT_PATH: /var/lib/proxymesh/routes.snapshot
      SHADOWSOCKS_LISTEN_HOST: 0.0.0.0
      HEALTH_ADDR: :18080
      REQUIRE_CANARY: "false"
    depends_on:
      - control-plane
      - upstream
    ports:
      - "127.0.0.1:51000:51000"
      - "127.0.0.1:51001:51001"
      - "127.0.0.1:18180:18080"

  sing-box:
    build:
      context: .
      dockerfile: Dockerfile.sing-box
    depends_on:
      - gateway
    ports:
      - "127.0.0.1:19100:1080"
