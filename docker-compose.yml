name: proxymesh
services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-proxymesh}
      POSTGRES_USER: ${POSTGRES_USER:-proxymesh}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-local-only-password}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 3s
      timeout: 3s
      retries: 20
    volumes:
      - postgres-data:/var/lib/postgresql/data

  control-plane:
    build:
      context: .
      dockerfile: Dockerfile.control-plane
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://proxymesh:local-only-password@postgres:5432/proxymesh?sslmode=disable}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-local-development-key}
      ADMIN_TOKEN: ${ADMIN_TOKEN:-local-admin-token}
      PUBLIC_PROXY_HOST: ${PUBLIC_PROXY_HOST:-proxy.example.com}
      INGRESS_PORT_START: 50000
      INGRESS_PORT_END: 50001
      AUTO_MIGRATE: "true"
      HTTP_ADDR: :8080
      GRPC_ADDR: :9090
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"

  gateway:
    build:
      context: .
      dockerfile: Dockerfile.gateway
    environment:
      CONTROL_GRPC_ADDR: control-plane:9090
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-local-development-key}
      SNAPSHOT_PATH: /var/lib/proxymesh/routes.snapshot
      SHADOWSOCKS_LISTEN_HOST: 0.0.0.0
      HEALTH_ADDR: :18080
      REQUIRE_CANARY: "false"
    depends_on:
      - control-plane
    ports:
      - "50000-50001:50000-50001"
      - "18080:18080"
    volumes:
      - gateway-data:/var/lib/proxymesh

volumes:
  postgres-data:
  gateway-data:
